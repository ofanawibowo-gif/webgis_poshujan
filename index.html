<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoring Pos Hujan Sumatera Barat</title>

<!-- Leaflet -->

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- Marker Cluster -->

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>

body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

#map{
width:100%;
height:100vh;
}

.labelPos{
background:transparent;
border:none;
box-shadow:none;
color:#444;
font-size:11px;
font-weight:bold;
text-shadow:1px 1px 2px white;
}

/* HEADER */

.header{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:6px 12px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.3);
z-index:1000;
font-size:13px;
font-weight:bold;
}

/* DASHBOARD */

#dashboard{
position:absolute;
top:60px;
right:10px;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.3);
font-size:13px;
line-height:1.6;
z-index:1000;
width:230px;
}

@media (max-width:600px){

#dashboard{
top:80px;
}

}

/* TOGGLE BUTTON */

#toggleDashboard{
background:#2c7be5;
color:white;
padding:6px;
text-align:center;
border-radius:4px;
margin-bottom:8px;
cursor:pointer;
font-weight:bold;
}

/* DASHBOARD CONTENT */

#dashboardContent{
display:block;
}

/* SEARCH */

#searchBox{
width:100%;
padding:6px;
border:1px solid #ccc;
border-radius:4px;
font-size:13px;
margin-bottom:10px;
}

/* DATE INPUT */

input[type="date"]{
width:100%;
padding:5px;
margin-bottom:6px;
border:1px solid #ccc;
border-radius:4px;
}

/* BUTTON */

button{
width:100%;
padding:6px;
background:#2c7be5;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
font-size:13px;
margin-top:5px;
}

button:hover{
background:#1a5ec8;
}

/* FILTER STAT */

.filter{
font-weight:bold;
color:#2c7be5;
cursor:pointer;
display:inline-block;
margin-bottom:4px;
}

.filter:hover{
text-decoration:underline;
}

/* MOBILE */

@media (max-width:600px){

#dashboard{
width:180px;
}

}

</style>

</head>

<body>

<div class="header">
Monitoring Kondisi Pos Hujan Sumatera Barat
</div>

<div id="dashboard">

<div id="toggleDashboard">☰ Dashboard</div>

<div id="dashboardContent">

<b>Dashboard Monitoring</b><br><br>

<input type="text" id="searchBox" placeholder="Cari nama pos hujan...">

<b>Filter Tanggal</b><br>

Tanggal awal <input type="date" id="tglAwal">

Tanggal akhir <input type="date" id="tglAkhir">

<button id="exportExcel">Export Excel</button>

<button id="showAll">Tampilkan Semua Pos</button>

<hr>

Total Pos : <span id="totalPos">0</span><br><br>

🟢 Baik : <span id="baik" class="filter" data-status="Baik">0</span><br>

🟡 Perbaikan : <span id="perbaikan" class="filter" data-status="Perbaikan">0</span><br>

🔴 Rusak : <span id="rusak" class="filter" data-status="Rusak">0</span><br>

⚪ Belum inspeksi : <span id="belum" class="filter" data-status="Belum">0</span>

</div>

</div>

<div id="map"></div>

<!-- Leaflet JS -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Marker Cluster -->

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- Library Export Excel -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Script utama -->

<script src="script.js"></script>

</body>

</html>
