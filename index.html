
<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoring Pos Hujan Sumatera Barat</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- Marker Cluster -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>

body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

#map{
width:100%;
height:100vh;
}

.header{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:8px 15px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.3);
z-index:1000;
font-size:14px;
font-weight:bold;
}

#dashboard{
position:absolute;
top:10px;
right:10px;
background:white;
padding:12px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.3);
font-size:13px;
line-height:1.6;
z-index:1000;
width:220px;
}

#searchBox{
width:100%;
padding:6px;
border:1px solid #ccc;
border-radius:4px;
font-size:13px;
margin-bottom:10px;
}

input[type="date"]{
width:100%;
padding:5px;
margin-bottom:6px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:6px;
background:#2c7be5;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
font-size:13px;
}

button:hover{
background:#1a5ec8;
}

</style>

</head>

<body>

<div class="header">
Monitoring Kondisi Pos Hujan Sumatera Barat
</div>

<div id="dashboard">

<b>Dashboard Monitoring</b><br><br>

<input type="text" id="searchBox" placeholder="Cari nama pos hujan...">

<b>Filter Tanggal</b><br>

Tanggal awal
<input type="date" id="tglAwal">

Tanggal akhir
<input type="date" id="tglAkhir">

<button id="exportExcel">Export Excel</button>

<hr>

Total Pos : <span id="totalPos">0</span><br>

🟢 Baik : <span id="baik">0</span><br>

🟡 Perbaikan : <span id="perbaikan">0</span><br>

🔴 Rusak : <span id="rusak">0</span><br>

⚪ Belum inspeksi : <span id="belum">0</span>

</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Marker Cluster -->
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- Library Export Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Script utama -->
<script src="script.js"></script>

</body>
</html>
